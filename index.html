<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>終極一夜狼人殺語音助手</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .role-card.active {
      border: 4px solid #f59e0b;
      background-color: #fef3c7;
    }
  </style>
</head>

<body class="bg-gray-900 text-white min-h-screen p-4">

  <div class="max-w-md mx-auto">
    <header class="text-center mb-6">
      <h1 class="text-2xl font-bold text-yellow-500">Ultimate One Night Helper</h1>
      <p class="text-gray-400 text-sm">請選擇本局使用的角色</p>
    </header>

    <button onclick="showGeneralRules()" class="text-xs text-blue-400 underline mb-4 block mx-auto">
      查看投票結算與平局規則
    </button>

    <div class="bg-gray-800 p-4 rounded-xl mb-6 flex justify-between items-center">
      <div>
        <span class="text-sm text-gray-400">已選角色：</span>
        <span id="selected-count" class="text-xl font-bold">0</span>
      </div>
      <div>
        <span class="text-sm text-gray-400">建議人數：</span>
        <span id="player-count" class="text-xl font-bold">0</span>
      </div>

      <div class="bg-gray-800 p-4 rounded-xl mb-6 shadow-inner">
        <div class="flex justify-between items-center mb-4">
          <span class="text-sm text-gray-400 font-medium">遊戲玩家人數</span>
          <div class="flex items-center space-x-4 bg-gray-700 rounded-lg p-1">
            <button onclick="adjustPlayerCount(-1)"
              class="w-8 h-8 flex items-center justify-center bg-gray-600 rounded hover:bg-gray-500">-</button>
            <span id="manual-player-count" class="text-xl font-bold w-4 text-center">3</span>
            <button onclick="adjustPlayerCount(1)"
              class="w-8 h-8 flex items-center justify-center bg-gray-600 rounded hover:bg-gray-500">+</button>
          </div>
        </div>

        <div class="border-t border-gray-700 pt-3 flex justify-between items-center">
          <div class="text-xs">
            <span class="text-gray-400">當前牌數：</span>
            <span id="selected-count" class="font-bold text-yellow-500">0</span>
          </div>
          <div class="text-xs">
            <span class="text-gray-400">所需總牌數：</span>
            <span id="target-card-count" class="font-bold text-blue-400">6</span>
          </div>
        </div>
      </div>
    </div>

    <div id="role-grid" class="grid grid-cols-3 gap-3 mb-24">
    </div>

    <div class="fixed bottom-0 left-0 right-0 p-4 bg-gray-900 border-t border-gray-700">
      <button id="start-game"
        class="w-full max-w-md mx-auto block bg-yellow-600 hover:bg-yellow-500 text-white font-bold py-3 rounded-full transition shadow-lg disabled:opacity-50"
        disabled>
        確認組合 (至少3張牌)
      </button>
    </div>
  </div>

  <div id="role-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-6 z-50">
    <div class="bg-gray-800 rounded-2xl p-6 w-full max-w-xs text-center">
      <div id="modal-icon"
        class="w-20 h-20 bg-gray-700 rounded-full mx-auto mb-4 flex items-center justify-center text-3xl">👤</div>
      <h2 id="modal-name" class="text-2xl font-bold mb-2">角色名稱</h2>
      <p id="modal-desc" class="text-gray-300 mb-6">角色描述文字...</p>
      <button onclick="closeModal()" class="bg-gray-600 px-6 py-2 rounded-lg">關閉</button>
    </div>
  </div>

  <script src="js/characters.js"></script>
  <script src="js/main.js"></script>
</body>

</html>
